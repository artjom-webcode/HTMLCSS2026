<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon" />

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="css/style.css" />
    <title>My navbar</title>
  </head>

  <body>
    <!--==================== HEADER ====================-->
    <header class="header" id="header">
      <div class="header__container">
        <a class="logo" href="index.html"><img src="" alt="Logo" /></a>
        <nav class="menu">
          <ul class="menu__list">
            <li class="menu__item"><a class="menu__link" href="#section-1">Section 1</a></li>
            <li class="menu__item"><a class="menu__link" href="#section-2">Section 2</a></li>
            <li class="menu__item"><a class="menu__link" href="#section-3">Section 3</a></li>
          </ul>
        </nav>
        <button class="nav__toggle">
          <span class="nav__line nav__line--top"></span>
          <span class="nav__line nav__line--middle"></span>
          <span class="nav__line nav__line--bottom"></span>
        </button>
      </div>
    </header>

    <!--==================== MAIN ====================-->
    <main class="main">
      <!--==================== SECTION ====================-->
      <section id="section-1" class="section-1">section 1</section>
      <section id="section-2" class="section-2">section 2</section>
      <section id="section-3" class="section-3">section 3</section>
    </main>

    <!--=============== MAIN JS ===============-->
    <script src="script.js"></script>
  </body>
</html>
