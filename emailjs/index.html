<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script>
      (function () {
        emailjs.init("V3NM28Kxf0p58TQf0");
      })();
    </script>

    <title>Форма</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .form-container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 320px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
      }

      input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
      }

      input:focus {
        border-color: #4a90e2;
      }

      .error {
        color: red;
        font-size: 12px;
        margin-top: 5px;
      }

      .error-input {
        border-color: red;
      }

      .success {
        border-color: green;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #4a90e2;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #357abd;
      }
    </style>
  </head>

  <body>
    <div class="form-container">
      <h2>Регистрация</h2>

      <form id="form">
        <div class="form-group">
          <label>Имя</label>
          <input type="text" id="name" />
          <div class="error" id="nameError"></div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="text" id="email" />
          <div class="error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label>Пароль</label>
          <input type="password" id="password" />
          <div class="error" id="passwordError"></div>
        </div>

        <button type="submit">Отправить</button>
      </form>
    </div>

    <script>
      const form = document.getElementById("form");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const name = document.getElementById("name");
        const email = document.getElementById("email");
        const password = document.getElementById("password");

        const nameError = document.getElementById("nameError");
        const emailError = document.getElementById("emailError");
        const passwordError = document.getElementById("passwordError");

        let isValid = true;

        // reset
        [name, email, password].forEach((el) => {
          el.classList.remove("error-input", "success");
        });

        nameError.textContent = "";
        emailError.textContent = "";
        passwordError.textContent = "";

        // validation name
        if (name.value.trim().length < 2) {
          nameError.textContent = "Минимум 2 символа";
          name.classList.add("error-input");
          isValid = false;
        } else {
          name.classList.add("success");
        }

        // validation email
        const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,}$/;
        if (!email.value.match(emailPattern)) {
          emailError.textContent = "Некорректный email";
          email.classList.add("error-input");
          isValid = false;
        } else {
          email.classList.add("success");
        }

        // validation password
        if (password.value.length < 6) {
          passwordError.textContent = "Минимум 6 символов";
          password.classList.add("error-input");
          isValid = false;
        } else {
          password.classList.add("success");
        }

        // SEND EMAILJS
        if (isValid) {
          emailjs
            .send("service_prlatkm", "template_284aifi", {
              name: name.value,
              email: email.value,
              password: password.value,
            })
            .then(() => {
              alert("Сообщение отправлено!");
              form.reset();
            })
            .catch((error) => {
              alert("Ошибка отправки: " + error.text);
            });
        }
      });
    </script>
  </body>
</html>
